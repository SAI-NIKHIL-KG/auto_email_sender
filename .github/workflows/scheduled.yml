name: Daily Script

on:
  schedule:
    # Runs every 12:01 minutes (for testing)
    - cron: '31 18 * * *'
  # Allows manual execution
  workflow_dispatch:

jobs:
  run:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip

          if (Test-Path "requirements.txt") {
              pip install -r requirements.txt
              Write-Host "✅ Dependencies installed."
          }
          else {
              Write-Host "⚠️ requirements.txt not found. Skipping installation."
          }

      - name: Run Birthday Wisher
        shell: pwsh
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
        run: |
          Write-Host "Starting Birthday Wisher..."
          python main.py

      - name: Workflow Completed
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "========================================"
          Write-Host "✅ Daily Script completed successfully!"
          Write-Host "========================================"
