name: Test Setup

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Check secrets are configured
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
        run: |
          if [ -z "$MY_EMAIL" ]; then
            echo "❌ MY_EMAIL secret is not set!"
            exit 1
          else
            echo "✅ MY_EMAIL is configured"
          fi

          if [ -z "$MY_PASSWORD" ]; then
            echo "❌ MY_PASSWORD secret is not set!"
            exit 1
          else
            echo "✅ MY_PASSWORD is configured"
          fi

      - name: Check required files exist
        run: |
          echo "Checking required files..."

          test -f main.py && echo "✅ main.py found" || (echo "❌ main.py not found" && exit 1)

          test -f birthdays.csv && echo "✅ birthdays.csv found" || (echo "❌ birthdays.csv not found" && exit 1)

          test -d letter_templates && echo "✅ letter_templates folder found" || (echo "❌ letter_templates folder not found" && exit 1)

      - name: Check letter templates
        run: |
          test -f letter_templates/letter_1.txt && echo "✅ letter_1.txt found" || (echo "❌ letter_1.txt missing" && exit 1)
          test -f letter_templates/letter_2.txt && echo "✅ letter_2.txt found" || (echo "❌ letter_2.txt missing" && exit 1)
          test -f letter_templates/letter_3.txt && echo "✅ letter_3.txt found" || (echo "❌ letter_3.txt missing" && exit 1)

      - name: Check Python syntax
        run: |
          python -m py_compile main.py
          echo "✅ Python syntax is correct"

      - name: Success
        run: |
          echo "========================================"
          echo "🎉 All checks passed!"
          echo "Your Birthday Wisher project is ready."
          echo "========================================"
