name: Test Setup

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip

          if (Test-Path "requirements.txt") {
            pip install -r requirements.txt
            Write-Host "✅ requirements.txt installed"
          }
          else {
            Write-Host "⚠️ requirements.txt not found"
          }

      - name: Check secrets
        shell: pwsh
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:MY_EMAIL)) {
              Write-Error "❌ MY_EMAIL secret is missing."
              exit 1
          }
          else {
              Write-Host "✅ MY_EMAIL secret found."
          }

          if ([string]::IsNullOrWhiteSpace($env:MY_PASSWORD)) {
              Write-Error "❌ MY_PASSWORD secret is missing."
              exit 1
          }
          else {
              Write-Host "✅ MY_PASSWORD secret found."
          }

      - name: Check required files
        shell: pwsh
        run: |
          if (!(Test-Path "main.py")) {
              Write-Error "❌ main.py not found"
              exit 1
          }
          Write-Host "✅ main.py found"

          if (!(Test-Path "birthdays.csv")) {
              Write-Error "❌ birthdays.csv not found"
              exit 1
          }
          Write-Host "✅ birthdays.csv found"

          if (!(Test-Path "requirements.txt")) {
              Write-Error "❌ requirements.txt not found"
              exit 1
          }
          Write-Host "✅ requirements.txt found"

          if (!(Test-Path "letter_templates")) {
              Write-Error "❌ letter_templates folder not found"
              exit 1
          }
          Write-Host "✅ letter_templates folder found"

      - name: Check template files
        shell: pwsh
        run: |
          if (!(Test-Path "letter_templates/letter_1.txt")) {
              Write-Error "❌ letter_1.txt missing"
              exit 1
          }
          Write-Host "✅ letter_1.txt found"

          if (!(Test-Path "letter_templates/letter_2.txt")) {
              Write-Error "❌ letter_2.txt missing"
              exit 1
          }
          Write-Host "✅ letter_2.txt found"

          if (!(Test-Path "letter_templates/letter_3.txt")) {
              Write-Error "❌ letter_3.txt missing"
              exit 1
          }
          Write-Host "✅ letter_3.txt found"

      - name: Check Python syntax
        shell: pwsh
        run: |
          python -m py_compile main.py
          Write-Host "✅ Python syntax is correct"

      - name: Success
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "========================================"
          Write-Host "🎉 ALL TESTS PASSED!"
          Write-Host "Your Birthday Wisher is ready."
          Write-Host "========================================"
